name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: notebooklm-linux-x64
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: notebooklm-macos-arm64
          - os: windows-latest
            target: bun-windows-x64
            artifact: notebooklm-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Build binary
        run: >
          bun build --compile
          --target=${{ matrix.target }}
          --external playwright
          --external playwright-core
          --external chromium-bidi
          --external electron
          src/cli/index.ts
          --outfile ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          body: |
            ## Installation

            Download the binary for your platform below, make it executable, and place it on your PATH.

            ### Linux / macOS
            ```bash
            chmod +x notebooklm-*
            sudo mv notebooklm-* /usr/local/bin/notebooklm
            ```

            ### Windows
            Rename to `notebooklm.exe` and add its location to your PATH.

            ### Authenticate
            ```bash
            notebooklm login
            ```

            On first run, `login` will automatically install Playwright and Chromium
            to `~/.notebookllm-ts/` (~50 MB, one-time). **npm must be available** on your PATH.

            All other commands work without Playwright once you have a saved session.
