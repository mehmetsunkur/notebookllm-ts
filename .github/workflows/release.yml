name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Installation

            Install directly from GitHub (no registry required):

            ```bash
            npm install github:mehmetsunkur/notebookllm-ts#${{ github.ref_name }}
            ```

            Or pin to the tag in your `package.json`:

            ```json
            "dependencies": {
              "notebooklm-ts": "github:mehmetsunkur/notebookllm-ts#${{ github.ref_name }}"
            }
            ```

            ### CLI usage (after install)

            ```bash
            npx notebooklm --help
            ```

            ### First-time setup — install Chromium (required for `login` only)

            ```bash
            npx playwright install chromium
            ```

            ### Authenticate

            ```bash
            npx notebooklm login
            ```
